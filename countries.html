    <script>
      // Dark mode toggle functionality
      (function() {
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;
        const html = document.documentElement;

        if (html.classList.contains('dark-mode')) {
          body.classList.add('dark-mode');
        }

        darkModeToggle.addEventListener('click', function() {
          body.classList.toggle('dark-mode');
          html.classList.toggle('dark-mode');
          const isDark = body.classList.contains('dark-mode');
          localStorage.setItem('darkMode', isDark);
        });
      })();

      // Map interactivity
      (function() {
        const tooltip = document.getElementById('tooltip');
        const visitedCountries = document.querySelectorAll('.country.visited');

        visitedCountries.forEach(country => {
          country.addEventListener('mouseenter', function(e) {
            const name = this.getAttribute('data-name');
            tooltip.textContent = name + ' (click to learn more)';
            tooltip.style.opacity = '1';
          });

          country.addEventListener('mousemove', function(e) {
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
          });

          country.addEventListener('mouseleave', function() {
            tooltip.style.opacity = '0';
          });

          country.addEventListener('click', function() {
            const url = this.getAttribute('data-url');
            if (url) {
              window.open(url, '_blank');
            }
          });
        });

        // Show country name on hover for all countries
        const allCountries = document.querySelectorAll('.country:not(.visited)');
        allCountries.forEach(country => {
          country.addEventListener('mouseenter', function(e) {
            const name = this.getAttribute('data-name');
            tooltip.textContent = name;
            tooltip.style.opacity = '1';
          });

          country.addEventListener('mousemove', function(e) {
            tooltip.style.left = (e.clientX + 15) + 'px';
            tooltip.style.top = (e.clientY + 15) + 'px';
          });

          country.addEventListener('mouseleave', function() {
            tooltip.style.opacity = '0';
          });
        });
      })();
    </script>
