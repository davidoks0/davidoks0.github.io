<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="assets/images/favicon.png" type="image/png">
    <link rel="preload" href="assets/fonts/Charter Regular.otf" as="font" type="font/otf" crossorigin>
    <link rel="preload" href="assets/fonts/Charter Italic.otf" as="font" type="font/otf" crossorigin>
    <link rel="preload" href="assets/fonts/Charter Bold.otf" as="font" type="font/otf" crossorigin>
    <meta name="description" content="Countries I've visited"/>
    <meta name="viewport" content="width=device-width, initial-scale=0.45">
    <link rel="canonical" href="https://davidoks.com/countries">
    <meta property="og:title" content="Countries - David Oks">
    <meta property="og:description" content="Countries I've visited">
    <meta property="og:url" content="https://davidoks.com/countries">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="assets/style.css">
    <script>
      (function() {
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        if (isDarkMode) {
          document.documentElement.classList.add('dark-mode');
        }
      })();
    </script>
    <title>Countries - David Oks</title>
    <style>
        .map-container {
            width: 100%;
            max-width: 800px;
            margin: 1em 0;
        }
        .map-container svg {
            width: 100%;
            height: auto;
        }
        .country,
        .country path {
            fill: #e0e0e0;
            stroke: #fff;
            stroke-width: 0.3;
            transition: fill 0.2s, opacity 0.2s;
        }
        .country.visited,
        .country.visited path {
            fill: #2a9d8f;
        }
        .country.visited:hover,
        .country.visited:hover path {
            fill: #3dbdad;
            opacity: 0.9;
        }
        html.dark-mode .country,
        body.dark-mode .country,
        html.dark-mode .country path,
        body.dark-mode .country path {
            fill: #3a3a3a;
            stroke: #2a2a2a;
        }
        html.dark-mode .country.visited,
        body.dark-mode .country.visited,
        html.dark-mode .country.visited path,
        body.dark-mode .country.visited path {
            fill: #5ec4b6;
        }
        html.dark-mode .country.visited:hover,
        body.dark-mode .country.visited:hover,
        html.dark-mode .country.visited:hover path,
        body.dark-mode .country.visited:hover path {
            fill: #7ed4c8;
        }
        .map-legend {
            display: flex;
            gap: 1.5em;
            margin-top: 1em;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5em;
        }
        .legend-color {
            width: 16px;
            height: 16px;
            border-radius: 2px;
        }
        .legend-color.visited {
            background: #2a9d8f;
        }
        .legend-color.not-visited {
            background: #e0e0e0;
        }
        html.dark-mode .legend-color.visited,
        body.dark-mode .legend-color.visited {
            background: #5ec4b6;
        }
        html.dark-mode .legend-color.not-visited,
        body.dark-mode .legend-color.not-visited {
            background: #3a3a3a;
        }
        .country-tooltip {
            position: fixed;
            background: #333;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 14px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
        }
        html.dark-mode .country-tooltip,
        body.dark-mode .country-tooltip {
            background: #f0f0f0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="menu">
            <div class="title-container">
                <span class="title">David Oks</span>
                <button class="dark-mode-toggle" id="darkModeToggle" aria-label="Toggle dark mode">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.5"/>
                        <path d="M12 2v2M12 20v2M22 12h-2M4 12H2M19.07 4.93l-1.41 1.41M6.34 17.66l-1.41 1.41M19.07 19.07l-1.41-1.41M6.34 6.34l-1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <ul>
                <li><a href="/">About</a></li>
                <li><a href="/books">Books</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/countries">Countries</a></li>
            </ul>
        </div>
        <div id="content">
            <h1 style="font-size: 20px;">Countries</h1>
            <p>Places I&rsquo;ve visited.</p>

            <div class="map-container" id="mapContainer">
                <!-- Map will be loaded here -->
            </div>

            <div class="map-legend">
                <div class="legend-item">
                    <div class="legend-color visited"></div>
                    <span>Visited</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color not-visited"></div>
                    <span>Not yet visited</span>
                </div>
            </div>
        </div>
    </div>

    <div class="country-tooltip" id="tooltip"></div>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N6V6S1SXDB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-N6V6S1SXDB');
    </script>
    <script>
      // Dark mode toggle functionality
      (function() {
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;
        const html = document.documentElement;

        if (html.classList.contains('dark-mode')) {
          body.classList.add('dark-mode');
        }

        darkModeToggle.addEventListener('click', function() {
          body.classList.toggle('dark-mode');
          html.classList.toggle('dark-mode');
          const isDark = body.classList.contains('dark-mode');
          localStorage.setItem('darkMode', isDark);
        });
      })();

      // Map loading and interactivity
      (function() {
        // Countries visited (ISO 3166-1 alpha-2 codes, lowercase)
        const visitedCountries = ['us', 'ca', 'mx', 'ar', 'py', 'uy', 'ec', 'es', 'gb', 'fr', 'pt', 'de', 'it', 'at', 'nl', 'be', 'lu', 'fi', 'ee', 'lv', 'ua', 'pl', 'cz', 'hr', 'si', 'rs', 'hu', 'il', 'tn', 'dz', 'cn', 'in', 'pk', 'af', 'ie', 'ch'];

        // Country names mapping
        const countryNames = {
          'us': 'United States', 'ca': 'Canada', 'mx': 'Mexico',
          'gt': 'Guatemala', 'bz': 'Belize', 'hn': 'Honduras', 'sv': 'El Salvador',
          'ni': 'Nicaragua', 'cr': 'Costa Rica', 'pa': 'Panama', 'cu': 'Cuba',
          'jm': 'Jamaica', 'ht': 'Haiti', 'do': 'Dominican Republic', 'pr': 'Puerto Rico',
          'co': 'Colombia', 've': 'Venezuela', 'gy': 'Guyana', 'sr': 'Suriname',
          'gf': 'French Guiana', 'ec': 'Ecuador', 'pe': 'Peru', 'br': 'Brazil',
          'bo': 'Bolivia', 'py': 'Paraguay', 'uy': 'Uruguay', 'ar': 'Argentina', 'cl': 'Chile',
          'is': 'Iceland', 'no': 'Norway', 'se': 'Sweden', 'fi': 'Finland', 'ru': 'Russia',
          'ee': 'Estonia', 'lv': 'Latvia', 'lt': 'Lithuania', 'by': 'Belarus', 'ua': 'Ukraine',
          'pl': 'Poland', 'de': 'Germany', 'cz': 'Czech Republic', 'sk': 'Slovakia',
          'at': 'Austria', 'hu': 'Hungary', 'ro': 'Romania', 'md': 'Moldova', 'bg': 'Bulgaria',
          'rs': 'Serbia', 'hr': 'Croatia', 'ba': 'Bosnia and Herzegovina', 'si': 'Slovenia', 'mk': 'North Macedonia',
          'al': 'Albania', 'gr': 'Greece', 'tr': 'Turkey', 'cy': 'Cyprus', 'it': 'Italy', 'ch': 'Switzerland',
          'fr': 'France', 'es': 'Spain', 'pt': 'Portugal', 'be': 'Belgium', 'nl': 'Netherlands',
          'gb': 'United Kingdom', 'ie': 'Ireland', 'dk': 'Denmark', 'lu': 'Luxembourg',
          'ma': 'Morocco', 'dz': 'Algeria', 'tn': 'Tunisia', 'ly': 'Libya', 'eg': 'Egypt',
          'mr': 'Mauritania', 'ml': 'Mali', 'ne': 'Niger', 'td': 'Chad', 'sd': 'Sudan',
          'sn': 'Senegal', 'gm': 'Gambia', 'gw': 'Guinea-Bissau', 'gn': 'Guinea',
          'sl': 'Sierra Leone', 'lr': 'Liberia', 'ci': 'Ivory Coast', 'bf': 'Burkina Faso',
          'gh': 'Ghana', 'tg': 'Togo', 'bj': 'Benin', 'ng': 'Nigeria', 'cm': 'Cameroon',
          'cf': 'Central African Republic', 'ss': 'South Sudan', 'et': 'Ethiopia',
          'er': 'Eritrea', 'dj': 'Djibouti', 'so': 'Somalia', 'somaliland': 'Somaliland', 'ke': 'Kenya', 'ug': 'Uganda',
          'cd': 'Democratic Republic of the Congo', 'cg': 'Congo', 'ga': 'Gabon', 'gq': 'Equatorial Guinea',
          'rw': 'Rwanda', 'bi': 'Burundi', 'tz': 'Tanzania', 'ao': 'Angola', 'zm': 'Zambia',
          'mw': 'Malawi', 'mz': 'Mozambique', 'zw': 'Zimbabwe', 'bw': 'Botswana',
          'na': 'Namibia', 'za': 'South Africa', 'sz': 'Eswatini', 'ls': 'Lesotho', 'mg': 'Madagascar',
          'sy': 'Syria', 'iq': 'Iraq', 'ir': 'Iran', 'sa': 'Saudi Arabia', 'ye': 'Yemen',
          'om': 'Oman', 'ae': 'United Arab Emirates', 'qa': 'Qatar', 'kw': 'Kuwait', 'jo': 'Jordan',
          'il': 'Israel', 'lb': 'Lebanon', 'ps': 'Palestine',
          'ge': 'Georgia', 'am': 'Armenia', 'az': 'Azerbaijan',
          'kz': 'Kazakhstan', 'uz': 'Uzbekistan', 'tm': 'Turkmenistan', 'kg': 'Kyrgyzstan',
          'tj': 'Tajikistan', 'af': 'Afghanistan', 'pk': 'Pakistan',
          'in': 'India', 'np': 'Nepal', 'bt': 'Bhutan', 'bd': 'Bangladesh', 'lk': 'Sri Lanka', 'mm': 'Myanmar',
          'th': 'Thailand', 'vn': 'Vietnam', 'la': 'Laos', 'kh': 'Cambodia', 'my': 'Malaysia',
          'sg': 'Singapore', 'id': 'Indonesia', 'ph': 'Philippines', 'tw': 'Taiwan',
          'cn': 'China', 'mn': 'Mongolia', 'kp': 'North Korea', 'kr': 'South Korea', 'jp': 'Japan',
          'au': 'Australia', 'nz': 'New Zealand', 'pg': 'Papua New Guinea'
        };

        // Load the SVG map
        fetch('assets/world-map.svg')
          .then(response => response.text())
          .then(svgText => {
            const container = document.getElementById('mapContainer');
            container.innerHTML = svgText;

            const svg = container.querySelector('svg');
            const tooltip = document.getElementById('tooltip');

            // Helper to add events to an element
            function addCountryEvents(element, id) {
              // Normalize ID (handle underscore prefixed IDs like _somaliland)
              const normalizedId = id.startsWith('_') ? id.substring(1) : id;

              element.classList.add('country');

              if (visitedCountries.includes(normalizedId)) {
                element.classList.add('visited');
              }

              element.addEventListener('mouseenter', function(e) {
                const name = countryNames[normalizedId] || normalizedId.charAt(0).toUpperCase() + normalizedId.slice(1);
                tooltip.textContent = name;
                tooltip.style.opacity = '1';
              });

              element.addEventListener('mousemove', function(e) {
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
              });

              element.addEventListener('mouseleave', function() {
                tooltip.style.opacity = '0';
              });
            }

            // Handle <g> groups (countries with multiple paths like US, Canada)
            const groups = svg.querySelectorAll('g[id]');
            groups.forEach(group => {
              const id = group.getAttribute('id');
              if (!id) return;
              addCountryEvents(group, id);
            });

            // Handle direct <path> elements (single-path countries)
            const paths = svg.querySelectorAll('path[id]');
            paths.forEach(path => {
              const id = path.getAttribute('id');
              if (!id) return;
              // Skip if parent is already a styled group
              if (path.parentElement.tagName === 'g' && path.parentElement.hasAttribute('id')) return;
              addCountryEvents(path, id);
            });
          });
      })();
    </script>
</body>
</html>
